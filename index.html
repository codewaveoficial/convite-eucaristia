<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f3e8ff, #7c3aed);
      font-family: sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      padding: 20px;
    }

    .dove-link {
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dove {
      width: 200px;
      height: 200px;
      object-fit: contain;
      object-position: center;
      opacity: 0;
      animation: appear 1.5s ease forwards 0.2s, float 3s ease-in-out 1.7s infinite, glow 2s ease-in-out 1.7s infinite;
      filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .dove-link:hover .dove {
      transform: scale(1.12) translateY(-8px);
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 40px rgba(124, 58, 237, 0.5));
    }

    .dove-link:active .dove {
      transform: scale(1.08);
    }

    @keyframes appear {
      to {
        opacity: 1;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes glow {
      0%, 100% {
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.7)) drop-shadow(0 0 30px rgba(124, 58, 237, 0.3));
      }
    }

    /* Tablet e telas médias (768px) */
    @media (max-width: 1024px) {
      .dove {
        width: 180px;
        height: 180px;
      }
    }

    /* Mobile (até 768px) */
    @media (max-width: 768px) {
      .dove {
        width: 240px;
        height: 240px;
      }

      .dove-link:hover .dove {
        transform: scale(1.1) translateY(-6px);
      }
    }

    /* Celular pequeno (até 480px) */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .dove {
        width: 200px;
        height: 200px;
      }

      .container {
        padding: 10px;
      }

      .dove-link:hover .dove {
        transform: scale(1.08) translateY(-4px);
      }
    }

  </style>
</head>
<body>

  <div class="container">
    <a href="convite.html" class="dove-link">
      <img src="pomba.png" alt="Pomba branca - Clique para ver o convite" class="dove">
    </a>
  </div>

</body>
</html>
