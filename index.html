<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f3e8ff, #7c3aed);
      font-family: sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    .floral-border {
      position: fixed;
      z-index: -1;
      opacity: 0.4;
      pointer-events: none;
    }

    .floral-border.top {
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80"><defs><g id="flower"><circle cx="20" cy="20" r="8" fill="%239b6ba8"/><circle cx="35" cy="15" r="6" fill="%23d8a8e8"/><circle cx="40" cy="30" r="6" fill="%23d8a8e8"/><circle cx="25" cy="38" r="6" fill="%23d8a8e8"/><circle cx="10" cy="35" r="6" fill="%23d8a8e8"/><circle cx="8" cy="20" r="6" fill="%23d8a8e8"/></g></defs><use href="%23flower" x="0" y="10"/><use href="%23flower" x="60" y="10"/><use href="%23flower" x="120" y="10"/><use href="%23flower" x="180" y="10"/><use href="%23flower" x="240" y="10"/><use href="%23flower" x="300" y="10"/><use href="%23flower" x="360" y="10"/><use href="%23flower" x="420" y="10"/><use href="%23flower" x="480" y="10"/><use href="%23flower" x="540" y="10"/><use href="%23flower" x="600" y="10"/><use href="%23flower" x="660" y="10"/><use href="%23flower" x="720" y="10"/><use href="%23flower" x="780" y="10"/><use href="%23flower" x="840" y="10"/><use href="%23flower" x="900" y="10"/><use href="%23flower" x="960" y="10"/><use href="%23flower" x="1020" y="10"/><use href="%23flower" x="1080" y="10"/><use href="%23flower" x="1140" y="10"/></svg>') repeat-x;
    }

    .floral-border.bottom {
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80"><defs><g id="flower"><circle cx="20" cy="20" r="8" fill="%239b6ba8"/><circle cx="35" cy="15" r="6" fill="%23d8a8e8"/><circle cx="40" cy="30" r="6" fill="%23d8a8e8"/><circle cx="25" cy="38" r="6" fill="%23d8a8e8"/><circle cx="10" cy="35" r="6" fill="%23d8a8e8"/><circle cx="8" cy="20" r="6" fill="%23d8a8e8"/></g></defs><use href="%23flower" x="0" y="10"/><use href="%23flower" x="60" y="10"/><use href="%23flower" x="120" y="10"/><use href="%23flower" x="180" y="10"/><use href="%23flower" x="240" y="10"/><use href="%23flower" x="300" y="10"/><use href="%23flower" x="360" y="10"/><use href="%23flower" x="420" y="10"/><use href="%23flower" x="480" y="10"/><use href="%23flower" x="540" y="10"/><use href="%23flower" x="600" y="10"/><use href="%23flower" x="660" y="10"/><use href="%23flower" x="720" y="10"/><use href="%23flower" x="780" y="10"/><use href="%23flower" x="840" y="10"/><use href="%23flower" x="900" y="10"/><use href="%23flower" x="960" y="10"/><use href="%23flower" x="1020" y="10"/><use href="%23flower" x="1080" y="10"/><use href="%23flower" x="1140" y="10"/></svg>') repeat-x;
    }

    .floral-border.left {
      left: 0;
      top: 0;
      bottom: 0;
      width: 60px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 60 1200"><defs><g id="flower"><circle cx="20" cy="20" r="8" fill="%239b6ba8"/><circle cx="35" cy="15" r="6" fill="%23d8a8e8"/><circle cx="40" cy="30" r="6" fill="%23d8a8e8"/><circle cx="25" cy="38" r="6" fill="%23d8a8e8"/><circle cx="10" cy="35" r="6" fill="%23d8a8e8"/><circle cx="8" cy="20" r="6" fill="%23d8a8e8"/></g></defs><use href="%23flower" x="10" y="0"/><use href="%23flower" x="10" y="60"/><use href="%23flower" x="10" y="120"/><use href="%23flower" x="10" y="180"/><use href="%23flower" x="10" y="240"/><use href="%23flower" x="10" y="300"/><use href="%23flower" x="10" y="360"/><use href="%23flower" x="10" y="420"/><use href="%23flower" x="10" y="480"/><use href="%23flower" x="10" y="540"/><use href="%23flower" x="10" y="600"/><use href="%23flower" x="10" y="660"/><use href="%23flower" x="10" y="720"/><use href="%23flower" x="10" y="780"/><use href="%23flower" x="10" y="840"/><use href="%23flower" x="10" y="900"/><use href="%23flower" x="10" y="960"/><use href="%23flower" x="10" y="1020"/><use href="%23flower" x="10" y="1080"/><use href="%23flower" x="10" y="1140"/></svg>') repeat-y;
    }

    .floral-border.right {
      right: 0;
      top: 0;
      bottom: 0;
      width: 60px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 60 1200"><defs><g id="flower"><circle cx="20" cy="20" r="8" fill="%239b6ba8"/><circle cx="35" cy="15" r="6" fill="%23d8a8e8"/><circle cx="40" cy="30" r="6" fill="%23d8a8e8"/><circle cx="25" cy="38" r="6" fill="%23d8a8e8"/><circle cx="10" cy="35" r="6" fill="%23d8a8e8"/><circle cx="8" cy="20" r="6" fill="%23d8a8e8"/></g></defs><use href="%23flower" x="10" y="0"/><use href="%23flower" x="10" y="60"/><use href="%23flower" x="10" y="120"/><use href="%23flower" x="10" y="180"/><use href="%23flower" x="10" y="240"/><use href="%23flower" x="10" y="300"/><use href="%23flower" x="10" y="360"/><use href="%23flower" x="10" y="420"/><use href="%23flower" x="10" y="480"/><use href="%23flower" x="10" y="540"/><use href="%23flower" x="10" y="600"/><use href="%23flower" x="10" y="660"/><use href="%23flower" x="10" y="720"/><use href="%23flower" x="10" y="780"/><use href="%23flower" x="10" y="840"/><use href="%23flower" x="10" y="900"/><use href="%23flower" x="10" y="960"/><use href="%23flower" x="10" y="1020"/><use href="%23flower" x="10" y="1080"/><use href="%23flower" x="10" y="1140"/></svg>') repeat-y;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      padding: 20px;
    }

    .dove-link {
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dove {
      width: 200px;
      height: 200px;
      object-fit: contain;
      object-position: center;
      opacity: 0;
      animation: appear 1.5s ease forwards 0.2s, float 3s ease-in-out 1.7s infinite, glow 2s ease-in-out 1.7s infinite;
      filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .dove-link:hover .dove {
      transform: scale(1.12) translateY(-8px);
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 40px rgba(124, 58, 237, 0.5));
    }

    .dove-link:active .dove {
      transform: scale(1.08);
    }

    @keyframes appear {
      to {
        opacity: 1;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes glow {
      0%, 100% {
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.7)) drop-shadow(0 0 30px rgba(124, 58, 237, 0.3));
      }
    }

    /* Tablet e telas médias (768px) */
    @media (max-width: 1024px) {
      .dove {
        width: 180px;
        height: 180px;
      }

      .floral-border.top,
      .floral-border.bottom {
        height: 60px;
      }

      .floral-border.left,
      .floral-border.right {
        width: 45px;
      }
    }

    /* Mobile (até 768px) */
    @media (max-width: 768px) {
      .dove {
        width: 240px;
        height: 240px;
      }

      .floral-border.top,
      .floral-border.bottom {
        height: 50px;
      }

      .floral-border.left,
      .floral-border.right {
        width: 35px;
      }

      .dove-link:hover .dove {
        transform: scale(1.1) translateY(-6px);
      }
    }

    /* Celular pequeno (até 480px) */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .dove {
        width: 200px;
        height: 200px;
      }

      .container {
        padding: 10px;
      }

      .floral-border.top,
      .floral-border.bottom {
        height: 40px;
      }

      .floral-border.left,
      .floral-border.right {
        width: 30px;
      }

      .dove-link:hover .dove {
        transform: scale(1.08) translateY(-4px);
      }
    }

  </style>
</head>
<body>

  <div class="floral-border top"></div>
  <div class="floral-border bottom"></div>
  <div class="floral-border left"></div>
  <div class="floral-border right"></div>

  <div class="container">
    <a href="convite.html" class="dove-link">
      <img src="pomba.png" alt="Pomba branca - Clique para ver o convite" class="dove">
    </a>
  </div>

</body>
</html>
